apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudsentinel-app
  namespace: default
  labels:
    app: cloudsentinel
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudsentinel
  template:
    metadata:
      labels:
        app: cloudsentinel
        version: v1
    spec:
      containers:
      - name: cloudsentinel
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cloudsentinel-service
  namespace: default
  labels:
    app: cloudsentinel
spec:
  selector:
    app: cloudsentinel
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudsentinel-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudsentinel-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
